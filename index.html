<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Lavagem do Cartel</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#1b1b1b;
    color:white;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1,h2{text-align:center;}

label{display:block;margin-top:12px;}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:12px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    cursor:pointer;
    color:white;
    font-size:15px;
}

button:hover{opacity:0.9;}

.extraBtn{background:#3498db;}

.lavagem-card{
    background:#2a2a2a;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    border-left:4px solid #2ecc71;
}

.lavagem-num{
    font-weight:bold;
    margin-bottom:5px;
}

/* 🔥 SELECT IGUAL INPUTS */
.ts-control{
    background:#2a2a2a !important;
    border:none !important;
    border-radius:8px !important;
    color:white !important;
    padding:12px !important;
    box-shadow:none !important;
}

.ts-dropdown{
    background:#2a2a2a !important;
    border:none !important;
    color:white !important;
}

.ts-dropdown .option{
    background:#2a2a2a !important;
    color:white !important;
}

.ts-dropdown .option:hover{
    background:#3a3a3a !important;
}

/* 📦 HISTÓRICO COM SCROLL */
#lista{
    max-height:400px;
    overflow-y:auto;
    background:#1f1f1f;
    padding:10px;
    border-radius:10px;
    border:1px solid #333;
}

#lista::-webkit-scrollbar{
    width:8px;
}

#lista::-webkit-scrollbar-thumb{
    background:#2ecc71;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>🧾 Sistema de Lavagem</h1>

<label>Facção</label>
<select id="faccao">
<option value="">Selecione</option>
<option>4M</option>
<option>B13</option>
<option>Blacklist</option>
<option>Brothers</option>
<option>Coronel</option>
<option>Cross & Guerra</option>
<option>Dendê</option>
<option>Guerra</option>
<option>HPI</option>
<option>Hospício</option>
<option>Legacy</option>
<option>Lowprofile</option>
<option>Malta</option>
<option>Mandrágora</option>
<option>MDC</option>
<option>Medelin</option>
<option>RV</option>
<option>YOLO</option>
</select>

<label>Passaporte</label>
<input id="passaporte">

<label>Valor sujo</label>
<input id="valor" type="text" placeholder="Ex: 100.000">

<button onclick="calcular()">Registrar Lavagem</button>
<button class="extraBtn" onclick="repostar()">Repostar última lavagem</button>

<h2>📜 Lavagens anteriores</h2>
<div id="lista"></div>

<script>
new TomSelect("#faccao",{create:false});

// 🔢 contador inicia em 26
let numero = localStorage.getItem("numeroLavagem");
numero = numero ? Number(numero) : 26;
if(isNaN(numero) || numero < 26) numero = 26;

// 📦 dados
let registros = JSON.parse(localStorage.getItem("registros")) || [];
let ultimoRegistro = null;
let editandoIndex = null;

// 🔧 converter 100.000 → 100000
function converterValor(valor){
    return Number(valor.replace(/\./g, ""));
}

// 💰 formatar 100000 → 100.000
function formatar(valor){
    return Number(valor).toLocaleString('pt-BR');
}

function calcular(){

    let faccao = document.getElementById("faccao").value;
    let passaporte = document.getElementById("passaporte").value.trim();
    let valorInput = document.getElementById("valor").value;

    if(!faccao || !passaporte || !valorInput){
        alert("Preencha todos os campos.");
        return;
    }

    let valorSujo = converterValor(valorInput);
    let valorLimpo = valorSujo * 0.80;

    let numFinal;

    if(editandoIndex !== null){
        numFinal = registros[editandoIndex].numero;
    } else {
        numFinal = numero;
        numero++;
        localStorage.setItem("numeroLavagem", numero);
    }

    let registro = {
        numero: numFinal,
        faccao,
        passaporte,
        valorSujo,
        valorLimpo
    };

    if(editandoIndex !== null){
        registros[editandoIndex] = registro;
        editandoIndex = null;
    } else {
        registros.push(registro);
    }

    localStorage.setItem("registros", JSON.stringify(registros));

    ultimoRegistro = registro;

    enviarDiscord(registro);
    atualizarLista();
}

// 🔵 repostar última lavagem (edita com mesmo número)
function repostar(){

    if(!ultimoRegistro){
        alert("Nenhuma lavagem ainda.");
        return;
    }

    document.getElementById("faccao").value = ultimoRegistro.faccao;
    document.getElementById("passaporte").value = ultimoRegistro.passaporte;
    document.getElementById("valor").value = ultimoRegistro.valorSujo;

    editandoIndex = registros.findIndex(r => r.numero === ultimoRegistro.numero);
}

// 🗑 excluir 1 a 1
function excluir(index){

    if(!confirm("Tem certeza que deseja excluir?")) return;

    registros.splice(index, 1);

    localStorage.setItem("registros", JSON.stringify(registros));

    atualizarLista();
}

// 📜 histórico
function atualizarLista(){

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let reverso = [...registros].reverse();

    reverso.forEach(r => {

        let div = document.createElement("div");
        div.className = "lavagem-card";

        div.innerHTML =
`<div class="lavagem-num">🧾 Solicitação de Lavagem Nº ${r.numero}</div>
🏴 ${r.faccao || "—"}<br>
👤 ${r.passaporte}<br>
💰 Sujo: ${formatar(r.valorSujo)}<br>
💵 Limpo: ${formatar(r.valorLimpo)}<br><br>

<button onclick="excluir(${registros.indexOf(r)})" style="background:#e74c3c;margin-top:5px;">
Excluir
</button>`;

        lista.appendChild(div);
    });
}

// 📩 discord
function enviarDiscord(r){

    fetch("URL_DO_WEBHOOK_AQUI", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            content:
`🧾 Solicitação de Lavagem Nº ${r.numero}

🏴 Facção: ${r.faccao || "—"}
👤 Passaporte: ${r.passaporte}
💰 Sujo: ${formatar(r.valorSujo)}
💵 Limpo: ${formatar(r.valorLimpo)}`
        })
    });
}

atualizarLista();
</script>

</body>
</html>
