<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Lavagem do Cartel</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#1b1b1b;
    color:white;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#resultado{
    margin-top:25px;
    background:#2a2a2a;
    padding:15px;
    border-radius:8px;
    white-space:pre-line;
}

.ts-control{
    background:#2a2a2a !important;
    border:none !important;
    color:white !important;
}

.ts-dropdown{
    background:#2a2a2a !important;
    color:white !important;
}

</style>

</head>

<body>

<h1>🧾 Sistema de Lavagem do Cartel</h1>

<label>Facção solicitante</label>

<select id="faccao">

<option value="">Selecione uma facção</option>

<option>4M</option>
<option>B13</option>
<option>Blacklist</option>
<option>Brothers</option>
<option>Coronel</option>
<option>Cross & Guerra</option>
<option>Dendê</option>
<option>Gêneis</option>
<option>Guerra</option>
<option>HPI</option>
<option>Hospício</option>
<option>Inxuga Jelo</option>
<option>Legacy</option>
<option>Lowprofile</option>
<option>Macallan</option>
<option>Malta</option>
<option>Mandrágora</option>
<option>MDC</option>
<option>Medelin</option>
<option>Midnight</option>
<option>Motocross</option>
<option>Naty</option>
<option>NWK</option>
<option>Royal</option>
<option>RV</option>
<option>Tropa do Russo</option>
<option>Vida Rasa</option>
<option>YOLO</option>

</select>

<label>Passaporte para pagamento</label> <input type="text" id="passaporte">

<label>Valor sujo</label> <input type="number" id="valor">

<button onclick="calcular()">
Registrar Lavagem
</button>

<div id="resultado"></div>

<script>

new TomSelect("#faccao",{
    create:false
});

let numero = 26;

function calcular(){

    let faccao = document.getElementById("faccao").value;
    let passaporte = document.getElementById("passaporte").value.trim();
    let valorSujo = Number(document.getElementById("valor").value);

    if(!faccao){
        alert("Selecione uma facção.");
        return;
    }

    if(!passaporte){
        alert("Informe o passaporte.");
        return;
    }

    if(!valorSujo || valorSujo <= 0){
        alert("Informe um valor válido.");
        return;
    }

    let valorLimpo = valorSujo * 0.80;

    let mensagem =
`🧾 Solicitação de lavagem Nº ${numero}

Facção solicitante: ${faccao}
Passaporte para pagamento: ${passaporte}
Valor sujo: $${valorSujo.toLocaleString('pt-BR')}
Valor limpo: $${valorLimpo.toLocaleString('pt-BR')}`;

    document.getElementById("resultado").innerText = mensagem;

    numero++;
}

</script>

</body>
</html>
