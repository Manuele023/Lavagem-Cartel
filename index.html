<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartel - Sistema de Lavagem</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#1b1b1b;
    color:white;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1,h2{text-align:center;}

label{display:block;margin-top:12px;}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    box-sizing:border-box;
}

/* botão */
button{
    width:100%;
    margin-top:12px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    cursor:pointer;
    color:white;
    font-size:15px;
}
button:hover{opacity:0.9;}

.lavagem-card{
    background:#2a2a2a;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    border-left:4px solid #2ecc71;
}

#lista{
    max-height:300px;
    overflow-y:auto;
    background:#1f1f1f;
    padding:10px;
    border-radius:10px;
    border:1px solid #333;
}

.painel{
    background:#2a2a2a;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
    border:1px solid #333;
}

.ranking{
    font-size:13px;
    color:#ddd;
}

/* 🔥 FIX DEFINITIVO TOM SELECT (SEM FUNDO BRANCO) */
.ts-wrapper{
    width:100%;
}

.ts-control{
    background:#2a2a2a !important;
    border:1px solid #333 !important;
    border-radius:8px !important;
    color:white !important;
    padding:12px !important;
    box-shadow:none !important;
}

.ts-control input{
    color:white !important;
    background:transparent !important;
}

.ts-control input::placeholder{
    color:#aaa !important;
}

.ts-dropdown{
    background:#2a2a2a !important;
    border:1px solid #333 !important;
    color:white !important;
}

.ts-dropdown .option{
    background:#2a2a2a !important;
    color:white !important;
}

.ts-dropdown .option:hover{
    background:#3a3a3a !important;
    color:white !important;
}

/* filtro lado a lado */
.filtro-linha{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.filtro-linha div{
    flex:1;
}

/* semanas */
.semana-box{
    background:#2a2a2a;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    border:1px solid #333;
}
</style>
</head>

<body>

<h1>🧾 Sistema de Lavagem</h1>

<label>Número da Lavagem</label>
<input id="numeroLavagemInput" type="number" placeholder="Ex: 26">

<label>Facção solicitante</label>
<select id="faccao">
<option value="">Selecione</option>
<option>4M</option>
<option>B13</option>
<option>Blacklist</option>
<option>Brothers</option>
<option>Coronel</option>
<option>Cross & Guerra</option>
<option>Dendê</option>
<option>Guerra</option>
<option>HPI</option>
<option>Hospício</option>
<option>Legacy</option>
<option>Lowprofile</option>
<option>Malta</option>
<option>Mandrágora</option>
<option>MDC</option>
<option>Medelin</option>
<option>RV</option>
<option>Yolo</option>
</select>

<label>Passaporte para pagamento</label>
<input id="passaporte" placeholder="Digite o passaporte">

<label>Valor sujo</label>
<input id="valor" type="text" placeholder="Ex: 100.000">

<button onclick="calcular()">Registrar Lavagem</button>

<h2>📜 Histórico de Lavagens</h2>
<div id="lista"></div>

<h2>📊 Painel de Controle do Cartel</h2>

<div class="painel">
📜 Total de lavagens: <span id="totalLavagens">0</span><br><br>
💰 Total lavado: <span id="totalDinheiro">0</span><br><br>
💸 Lucro total: <span id="lucroTotal">0</span><br><br>

<strong>🏴 Ranking geral</strong>
<div id="ranking" class="ranking"></div>
</div>

<h2>📊 Registro Semanal</h2>
<div class="painel">
<div id="semanasContainer"></div>
</div>

<h2>📆 Registro Mensal</h2>

<div class="painel">

<div class="filtro-linha">

<div>
<label>Mês</label>
<select id="filtroMes" onchange="atualizarPainel()"></select>
</div>

<div>
<label>Ano</label>
<select id="filtroAno" onchange="atualizarPainel()"></select>
</div>

</div>

<br>

📅 Mês selecionado: <span id="mesAtual"></span><br><br>
💰 Total mensal: <span id="totalMensal"></span><br><br>
💸 Lucro mensal: <span id="lucroMensal"></span><br><br>

<strong>🏴 Ranking mensal</strong>
<div id="rankingMensal" class="ranking"></div>

<br>

<strong>📜 Lavagens do período</strong>
<div id="listaMensal" style="
max-height:250px;
overflow-y:auto;
margin-top:10px;
padding:10px;
background:#1f1f1f;
border-radius:10px;
border:1px solid #333;
"></div>

</div>

<script>
new TomSelect("#faccao",{create:false});

let registros = JSON.parse(localStorage.getItem("registros")) || [];
let numero = localStorage.getItem("numeroLavagem");
numero = numero ? Number(numero) : 26;

function converter(v){ return Number(v.replace(/\./g,"")); }
function formatar(v){ return Number(v).toLocaleString("pt-BR"); }

function obterMes(){ return String(new Date().getMonth()+1).padStart(2,"0"); }
function obterAno(){ return String(new Date().getFullYear()); }

function obterSemanaDoMes(data){
    let d = new Date(data);
    return Math.ceil(d.getDate()/7);
}

// webhook (mantenha seu link aqui)
function enviarDiscord(r){
    fetch("https://discord.com/api/webhooks/1519147289036193972/WreVR0l-ZJ7GbI7xiGUMdi-2k6P64hem0GmnH4dyGHGvlt0neVrf88mAIzaciy2Frjsm",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            embeds:[{
                title:`🧾 Solicitação de Lavagem Nº ${r.numero}`,
                color:0x2ecc71,
                description:
`**Facção solicitante:** ${r.faccao}
**Passaporte:** ${r.passaporte}

💰 **Valores**

**Valor sujo:** ${formatar(r.valorSujo)}
**Valor limpo:** ${formatar(r.valorLimpo)}`,
                timestamp:new Date().toISOString()
            }]
        })
    });
}

// registrar
function calcular(){

    let faccao=document.getElementById("faccao").value;
    let passaporte=document.getElementById("passaporte").value.trim();
    let valor=document.getElementById("valor").value;
    let numInput=document.getElementById("numeroLavagemInput").value;

    if(!faccao||!passaporte||!valor){
        alert("Preencha tudo");
        return;
    }

    let valorSujo=converter(valor);
    let valorLimpo=valorSujo*0.80;

    let numFinal=numInput?Number(numInput):numero++;

    let data=new Date();

    let registro={
        numero:numFinal,
        faccao,
        passaporte,
        valorSujo,
        valorLimpo,
        data:data.toLocaleString("pt-BR"),
        mes:String(data.getMonth()+1).padStart(2,"0"),
        ano:String(data.getFullYear()),
        semana:obterSemanaDoMes(data)
    };

    registros.push(registro);

    localStorage.setItem("registros",JSON.stringify(registros));

    enviarDiscord(registro);

    atualizarTudo();
}

// excluir
function excluir(i){
    if(!confirm("Excluir?")) return;
    registros.splice(i,1);
    localStorage.setItem("registros",JSON.stringify(registros));
    atualizarTudo();
}

// histórico
function atualizarLista(){

    let lista=document.getElementById("lista");
    lista.innerHTML="";

    [...registros].reverse().forEach(r=>{

        let div=document.createElement("div");
        div.className="lavagem-card";

        div.innerHTML=
`🧾 Nº ${r.numero}<br>
📅 ${r.data}<br>
🔫 ${r.faccao}<br>
💵 ${formatar(r.valorSujo)}<br>
💸 ${formatar(r.valorLimpo)}<br><br>

<button onclick="excluir(${registros.indexOf(r)})" style="background:#e74c3c;">Excluir</button>`;

        lista.appendChild(div);
    });
}

// filtros
function initFiltros(){

    let m=document.getElementById("filtroMes");
    let a=document.getElementById("filtroAno");

    for(let i=1;i<=12;i++){
        let o=document.createElement("option");
        o.value=String(i).padStart(2,"0");
        o.text=o.value;
        m.appendChild(o);
    }

    let ano=new Date().getFullYear();

    for(let i=ano;i>=ano-5;i--){
        let o=document.createElement("option");
        o.value=i;
        o.text=i;
        a.appendChild(o);
    }

    m.value=obterMes();
    a.value=obterAno();
}

// SEMANAL
function atualizarSemanas(filtrado){

    let container=document.getElementById("semanasContainer");
    container.innerHTML="";

    for(let s=1;s<=5;s++){

        let dados=filtrado.filter(r=>r.semana===s);

        let total=dados.reduce((a,b)=>a+b.valorSujo,0);
        let lucro=total*0.10;

        let ranking={};

        dados.forEach(r=>{
            ranking[r.faccao]=(ranking[r.faccao]||0)+r.valorSujo;
        });

        let rankText=Object.entries(ranking)
        .sort((a,b)=>b[1]-a[1])
        .map((r,i)=>`${i+1}. ${r[0]} — ${formatar(r[1])}`)
        .join("<br>") || "Sem dados";

        container.innerHTML+=`
<div class="semana-box">
<strong>📅 Semana ${s}</strong><br><br>

💰 Total: ${formatar(total)}<br>
💸 Lucro: ${formatar(lucro)}<br><br>

<strong>🏴 Ranking</strong><br>
${rankText}
</div>
`;
    }
}

// painel
function atualizarPainel(){

    let mes=document.getElementById("filtroMes").value;
    let ano=document.getElementById("filtroAno").value;

    let filtrado=registros.filter(r=>r.mes===mes && r.ano===ano);

    document.getElementById("mesAtual").innerText=`${mes}/${ano}`;

    let total=filtrado.reduce((a,b)=>a+b.valorSujo,0);
    let lucro=total*0.10;

    document.getElementById("totalMensal").innerText=formatar(total);
    document.getElementById("lucroMensal").innerText=formatar(lucro);

    atualizarSemanas(filtrado);

    let ranking={};

    filtrado.forEach(r=>{
        ranking[r.faccao]=(ranking[r.faccao]||0)+r.valorSujo;
    });

    document.getElementById("rankingMensal").innerHTML=
    Object.entries(ranking)
    .sort((a,b)=>b[1]-a[1])
    .map((r,i)=>`${i+1}. ${r[0]} — ${formatar(r[1])}`)
    .join("<br>") || "Sem dados";

    let listaM=document.getElementById("listaMensal");
    listaM.innerHTML="";

    filtrado.slice().reverse().forEach(r=>{
        let div=document.createElement("div");
        div.innerHTML=`📅 ${r.data}<br>🔫 ${r.faccao}<br>💵 ${formatar(r.valorSujo)}<br><br>`;
        listaM.appendChild(div);
    });

    let totalGeral=registros.reduce((a,b)=>a+b.valorSujo,0);

    document.getElementById("totalDinheiro").innerText=formatar(totalGeral);
    document.getElementById("lucroTotal").innerText=formatar(totalGeral*0.10);

    let rankG={};

    registros.forEach(r=>{
        rankG[r.faccao]=(rankG[r.faccao]||0)+r.valorSujo;
    });

    document.getElementById("ranking").innerHTML=
    Object.entries(rankG)
    .sort((a,b)=>b[1]-a[1])
    .map((r,i)=>`${i+1}. ${r[0]} — ${formatar(r[1])}`)
    .join("<br>");
}

function atualizarTudo(){
    atualizarLista();
    atualizarPainel();
}

initFiltros();
atualizarTudo();
</script>

</body>
</html>
