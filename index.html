<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartel - Sistema de Lavagem</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#1b1b1b;
    color:white;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1,h2{text-align:center;}

label{display:block;margin-top:12px;}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    box-sizing:border-box;
}

/* botão */
button{
    width:100%;
    margin-top:12px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    cursor:pointer;
    color:white;
    font-size:15px;
}
button:hover{opacity:0.9;}

.lavagem-card{
    background:#2a2a2a;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    border-left:4px solid #2ecc71;
}

#lista{
    max-height:300px;
    overflow-y:auto;
    background:#1f1f1f;
    padding:10px;
    border-radius:10px;
    border:1px solid #333;
}

.painel{
    background:#2a2a2a;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
    border:1px solid #333;
}

.ranking{
    font-size:13px;
    color:#ddd;
}

/* TOM SELECT */
.ts-wrapper{width:100%;}
.ts-control{
    background:#2a2a2a !important;
    border:1px solid #333 !important;
    border-radius:8px !important;
    color:white !important;
    padding:12px !important;
}
.ts-dropdown{
    background:#2a2a2a !important;
    border:1px solid #333 !important;
    color:white !important;
}
.ts-dropdown .option:hover{
    background:#3a3a3a !important;
}

/* SEMANAL GRID */
.semana-grid{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:10px;
    margin-top:10px;
}

.semana-box{
    background:#2a2a2a;
    padding:10px;
    border-radius:10px;
    border:1px solid #333;
}

/* FILTRO MENSAL */
.filtro-linha{
    display:flex;
    gap:10px;
    margin-top:10px;
}
.filtro-linha div{flex:1;}
</style>
</head>

<body>

<h1>🧾 Sistema de Lavagem</h1>

<label>Número da Lavagem</label>
<input id="numeroLavagemInput" type="number">

<label>Facção solicitante</label>
<select id="faccao">
<option>4M</option>
<option>B13</option>
<option>Blacklist</option>
<option>Brothers</option>
<option>Coronel</option>
<option>Cross & Guerra</option>
<option>Dendê</option>
<option>Guerra</option>
<option>HPI</option>
<option>Hospício</option>
<option>Legacy</option>
<option>Lowprofile</option>
<option>Malta</option>
<option>Mandrágora</option>
<option>MDC</option>
<option>Medelin</option>
<option>RV</option>
<option>Yolo</option>
</select>

<label>Passaporte</label>
<input id="passaporte">

<label>Valor sujo</label>
<input id="valor">

<button onclick="calcular()">Registrar Lavagem</button>

<h2>📜 Histórico de Lavagens</h2>
<div id="lista"></div>

<h2>📊 Painel de Controle</h2>
<div class="painel">
📜 Total de lavagens: <span id="totalLavagens">0</span><br>
💰 Valor total lavado: <span id="totalDinheiro">0</span><br>
💸 Lucro: <span id="lucroTotal">0</span><br>
</div>

<h2>📊 Registro Semanal</h2>
<div class="painel">
<div id="semanasContainer"></div>
</div>

<h2>📆 Registro Mensal</h2>
<div class="painel">

<div class="filtro-linha">
<div>
<label>Mês</label>
<select id="filtroMes" onchange="atualizarTudo()"></select>
</div>

<div>
<label>Ano</label>
<select id="filtroAno" onchange="atualizarTudo()"></select>
</div>
</div>

<br>

📅 Mês: <span id="mesAtual"></span><br><br>
💰 Total lavado mensal: <span id="totalMensal"></span><br><br>
💸 Lucro mensal: <span id="lucroMensal"></span><br><br>

<strong>🏴 Ranking mensal de facções</strong>
<div id="rankingMensal" class="ranking"></div>

<br>

<strong>📜 Lavagens do mês</strong>
<div id="listaMensal"></div>

</div>

<script>
new TomSelect("#faccao",{create:false});

let registros = JSON.parse(localStorage.getItem("registros")) || [];
let numero = 26;

function converter(v){ return Number(v.replace(/\./g,"")); }
function formatar(v){ return Number(v).toLocaleString("pt-BR"); }

function calcular(){

    let faccao=document.getElementById("faccao").value;
    let passaporte=document.getElementById("passaporte").value;
    let valor=document.getElementById("valor").value;

    let valorSujo=converter(valor);
    let valorLimpo=valorSujo*0.80;

    let data=new Date();

    registros.push({
        numero:numero++,
        faccao,
        passaporte,
        valorSujo,
        valorLimpo,
        semana:Math.ceil(data.getDate()/7),
        mes:String(data.getMonth()+1).padStart(2,"0"),
        ano:String(data.getFullYear())
    });

    localStorage.setItem("registros",JSON.stringify(registros));
    atualizarTudo();
}

/* HISTÓRICO */
function atualizarLista(){

    let lista=document.getElementById("lista");
    lista.innerHTML="";

    [...registros].reverse().forEach(r=>{

        let div=document.createElement("div");
        div.className="lavagem-card";

        div.innerHTML=`
🧾 Solicitação de lavagem Nº ${r.numero}<br>
🔫 Facção solicitante: ${r.faccao}<br>
💵 Valor sujo: ${formatar(r.valorSujo)}<br>
💸 Valor limpo: ${formatar(r.valorLimpo)}
`;

        lista.appendChild(div);
    });
}

/* SEMANAL GRID */
function atualizarSemanas(){

    let container=document.getElementById("semanasContainer");

    function box(lista,titulo){

        let total=lista.reduce((a,b)=>a+b.valorSujo,0);
        let lucro=total*0.10;

        return `
<div class="semana-box">
<strong>Semana ${titulo}</strong><br><br>
💰 Valor lavado: ${formatar(total)}<br>
💸 Lucro semanal: ${formatar(lucro)}
</div>`;
    }

    let s1=registros.filter(r=>r.semana===1);
    let s2=registros.filter(r=>r.semana===2);
    let s3=registros.filter(r=>r.semana===3);
    let s4=registros.filter(r=>r.semana===4);
    let s5=registros.filter(r=>r.semana===5);

    container.innerHTML=`
<div class="semana-grid">
${box(s1,1)}
${box(s2,2)}
${box(s3,3)}
${box(s4,4)}
${box(s5,5)}
</div>`;
}

/* MENSAL */
function atualizarMensal(){

    let mes=document.getElementById("filtroMes").value;
    let ano=document.getElementById("filtroAno").value;

    let filtrado=registros.filter(r=>r.mes===mes && r.ano===ano);

    document.getElementById("mesAtual").innerText=`${mes}/${ano}`;

    let total=filtrado.reduce((a,b)=>a+b.valorSujo,0);

    document.getElementById("totalMensal").innerText=formatar(total);
    document.getElementById("lucroMensal").innerText=formatar(total*0.10);

    let lista=document.getElementById("listaMensal");
    lista.innerHTML="";

    filtrado.reverse().forEach(r=>{
        lista.innerHTML+=`
🧾 Solicitação de lavagem Nº ${r.numero}<br>
🔫 Facção solicitante: ${r.faccao}<br>
💵 Valor sujo: ${formatar(r.valorSujo)}<br>
💸 Valor limpo: ${formatar(r.valorLimpo)}<br><br>`;
    });
}

/* TOTAL */
function atualizarTudo(){

    document.getElementById("totalLavagens").innerText=registros.length;

    let total=registros.reduce((a,b)=>a+b.valorSujo,0);

    document.getElementById("totalDinheiro").innerText=formatar(total);
    document.getElementById("lucroTotal").innerText=formatar(total*0.10);

    atualizarLista();
    atualizarSemanas();
    atualizarMensal();
}

atualizarTudo();
</script>

</body>
</html>
