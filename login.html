<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cartel - Login</title>

<link rel="icon" type="image/png" href="logo.png">
    
<style>

*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    margin:0;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(
        rgba(0,0,0,.80),
        rgba(0,0,0,.95)
    ),
    url("fundo-cartel.png");

    background-size:cover;
    background-position:center;

    color:white;

}



.container{

    width:480px;
    max-width:90%;

    background:rgba(20,20,20,.90);

    padding:35px;

    border-radius:15px;

    border:1px solid rgba(255,255,255,.1);

    box-shadow:0 0 35px black;

    backdrop-filter:blur(10px);

}



.logo{

    text-align:center;

}



.logo img{

    width:100px;
    height:100px;

    object-fit:contain;

}



h1{

    text-align:center;

    color:#b30000;

    letter-spacing:3px;

    margin-bottom:25px;

}



h2{

    text-align:center;

    font-size:18px;

    margin-bottom:20px;

}



input{

    width:100%;

    padding:13px;

    margin-bottom:12px;

    background:#111;

    border:none;

    border-radius:8px;

    color:white;

    outline:none;

}



input:focus{

    border:1px solid #b30000;

}



.checkbox{

    display:flex;

    align-items:center;

    gap:8px;

    margin:10px 0 20px;

    font-size:14px;

}



.checkbox input{

    width:auto;

    margin:0;

}



button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;

    margin-top:10px;

}



.login{

    background:#8b0000;

    color:white;

}



.login:hover{

    background:#b30000;

}



.cadastro{

    background:#252525;

    color:white;

}



.cadastro:hover{

    background:#333;

}



#mensagem{

    text-align:center;

    margin-top:15px;

    font-size:14px;

}

.senha-box{
    position:relative;
    width:100%;
}


.senha-box input{
    width:100%;
    padding-right:40px;
}


.olho{

    position:absolute;

    right:12px;

    top:50%;

    transform:translateY(-50%);

    width:18px;

    height:18px;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    z-index:2;

}


.olho svg{

    width:16px;

    height:16px;

    fill:white;

}

</style>

</head>



<body>


<div class="container">


<div class="logo">
<img src="logo.png">
</div>


<h1>CARTEL</h1>


<h2>LOGIN</h2>



<div id="areaCadastro" style="display:none">


<input 
id="nomeUsuario"
placeholder="Nome de usuário">


<input 
id="nomeRP"
placeholder="Nome em RP">


<input 
id="email"
type="email"
placeholder="E-mail">


<div class="senha-box">

<input 
id="senha"
type="password"
placeholder="Senha">

<span onclick="mostrarSenha('senha', this)">
<svg viewBox="0 0 24 24">
<path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7z"/>
<circle cx="12" cy="12" r="2.5"/>
</svg>

</span>

</div>

    
<div class="senha-box">

<input 
id="confirmarSenha"
type="password"
placeholder="Confirmar senha">

<span onclick="mostrarSenha('confirmarSenha', this)">
<svg viewBox="0 0 24 24">
<path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7z"/>
<circle cx="12" cy="12" r="2.5"/>
</svg>

</span>

</div>


</div>


<div id="areaLogin">


<input 
id="loginUsuario"
placeholder="E-mail ou Nome de usuário">


<div class="senha-box">

<input 
id="senhaLogin"
type="password"
placeholder="Senha">

<span onclick="mostrarSenha('senhaLogin', this)">
 <svg viewBox="0 0 24 24">
<path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7z"/>
<circle cx="12" cy="12" r="2.5"/>
</svg>

</span>

</div>


</div>

<div class="checkbox">

<input 
type="checkbox"
id="lembrar">

<label>
Manter conectado
</label>

</div>



<button 
id="botaoPrincipal"
class="login"
onclick="entrar()">

Entrar

</button>


<button 
id="botaoCadastro"
class="cadastro"
onclick="mostrarCadastro()">

Não tem uma conta? Criar conta

</button>


<div id="mensagem"></div>


</div>



<script type="module">


import { auth, db } from "./firebase.js";


import {

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

setPersistence,

browserLocalPersistence,

browserSessionPersistence

} 
from 
"https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";


import {

doc,

setDoc,

serverTimestamp,

collection,

getDocs

}

from

"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";





function mensagem(texto){

document.getElementById("mensagem").innerHTML = texto;

}



async function configurarPersistencia(){


const lembrar =
document.getElementById("lembrar").checked;



await setPersistence(

auth,

lembrar
?
browserLocalPersistence
:
browserSessionPersistence

);


}




window.cadastrar = async function(){



const nomeUsuario =
document.getElementById("nomeUsuario").value.trim();


const nomeRP =
document.getElementById("nomeRP").value.trim();


const email =
document.getElementById("email").value.trim();


const senha =
document.getElementById("senha").value;


const confirmar =
document.getElementById("confirmarSenha").value;



if(!nomeUsuario || !nomeRP || !email || !senha || !confirmar){

mensagem("❌ Preencha todos os campos.");

return;

}



if(senha !== confirmar){

mensagem("❌ As senhas não coincidem.");

return;

}



if(senha.length < 6){

mensagem("❌ A senha precisa ter pelo menos 6 caracteres.");

return;

}



try{


await configurarPersistencia();



const usuario = await createUserWithEmailAndPassword(

auth,

email,

senha

);



await setDoc(

doc(db,"usuarios",usuario.user.uid),

{

nomeUsuario,

nomeRP,

email,

admin:false,

aprovado:false,

ativo:true,

criadoEm:serverTimestamp()

}

);



mensagem(
"✅ Conta criada! Aguarde aprovação de um administrador."
);



}catch(e){

console.error(e);

mensagem(
"❌ " + e.message
);

}



}




window.entrar = async function(){

const login =
document.getElementById("loginUsuario").value.trim();

const senha =
document.getElementById("senhaLogin").value;


try{

await configurarPersistencia();


let email = login;


// Se não for e-mail, procura pelo nome de usuário
if(!login.includes("@")){


const usuariosRef = collection(db,"usuarios");

const busca = await getDocs(usuariosRef);


let encontrado = null;


busca.forEach((doc)=>{

const dados = doc.data();


if(
dados.nomeUsuario.toLowerCase() === login.toLowerCase()
){

encontrado = dados.email;

}

});


if(!encontrado){

mensagem("❌ Usuário não encontrado.");

return;

}


email = encontrado;


}



await signInWithEmailAndPassword(

auth,

email,

senha

);



window.location.href="index.html";



}catch(e){


mensagem(
"❌ Usuário ou senha incorretos."
);


}



}

window.mostrarCadastro = function(){

    document.getElementById("areaLogin").style.display = "none";

    document.getElementById("areaCadastro").style.display = "block";


    document.querySelector("h2").innerHTML = "CADASTRO";


    document.getElementById("botaoPrincipal").innerHTML = "Criar conta";

    document.getElementById("botaoPrincipal").onclick = cadastrar;


    document.getElementById("botaoCadastro").innerHTML = "Já tenho uma conta";


    document.getElementById("botaoCadastro").onclick = voltarLogin;

};


window.voltarLogin = function(){

    document.getElementById("areaCadastro").style.display = "none";

    document.getElementById("areaLogin").style.display = "block";


    document.querySelector("h2").innerHTML = "LOGIN";


    document.getElementById("botaoPrincipal").innerHTML = "Entrar";

    document.getElementById("botaoPrincipal").onclick = entrar;


    document.getElementById("botaoCadastro").innerHTML = "Não tem uma conta? Criar conta";


    document.getElementById("botaoCadastro").onclick = mostrarCadastro;

};

window.mostrarSenha = function(id, elemento){

    const campo = document.getElementById(id);


    if(campo.type === "password"){

        campo.type = "text";

        elemento.innerHTML = `
        <svg viewBox="0 0 24 24">
        <path d="M3 3l18 18"/>
        <path d="M10.5 10.5a2.5 2.5 0 0 0 3 3"/>
        <path d="M9.9 5.1A11 11 0 0 1 12 5c7 0 11 7 11 7a18 18 0 0 1-5 5.5"/>
        <path d="M6.6 6.6C3.6 8.5 1 12 1 12s4 7 11 7a10.9 10.9 0 0 0 4.1-.8"/>
        </svg>`;

    }else{

        campo.type = "password";

        elemento.innerHTML = `
        <svg viewBox="0 0 24 24">
        <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7z"/>
        <circle cx="12" cy="12" r="2.5"/>
        </svg>`;

    }

}
</script>


</body>

</html>
